<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f8fbff">
    <meta
      name="description"
      content="raccoon 的服务导航页，收纳服务器上不同端口的小网站入口。"
    >
    <title>raccoon 的服务导航</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fbff;
        --ink: #17202a;
        --muted: #657181;
        --paper: rgba(255, 255, 255, 0.88);
        --paper-strong: rgba(255, 255, 255, 0.96);
        --line: rgba(23, 32, 42, 0.12);
        --shadow: 0 22px 70px rgba(34, 55, 80, 0.16);
        --accent: #f47466;
        --teal: #1f9d8a;
        --gold: #d39a2d;
        --blue: #4d79c7;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        scroll-behavior: smooth;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        line-height: 1.6;
        letter-spacing: 0;
        background: url("assets/service-navigator.jpg") center/cover no-repeat fixed;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        background: rgba(0, 0, 0, 0.4);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(1120px, calc(100% - 40px));
        margin: 0 auto;
      }

      .service-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        width: 100%;
        max-width: 600px;
      }

      .service-card {
        position: relative;
        display: grid;
        min-height: 172px;
        padding: 22px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: 0 14px 42px rgba(0, 0, 0, 0.3);
        transition: transform 170ms ease, border-color 170ms ease, box-shadow 170ms ease;
      }

      .service-card::before {
        position: absolute;
        inset: 0 auto 0 0;
        width: 5px;
        content: "";
        background: var(--service-accent, var(--accent));
      }

      .service-card:hover {
        border-color: var(--service-accent, var(--accent));
        box-shadow: 0 22px 54px rgba(0, 0, 0, 0.4);
        transform: translateY(-4px);
      }

      .service-card__main {
        display: grid;
        align-content: space-between;
        gap: 18px;
        min-width: 0;
      }

      .service-card__top {
        display: grid;
        gap: 10px;
      }

      .service-card__name {
        margin: 0;
        font-size: 22px;
        line-height: 1.18;
        word-break: break-word;
      }

      .service-card__url {
        display: block;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .service-card__bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .service-card__route {
        max-width: 70%;
        padding: 5px 8px;
        overflow: hidden;
        border: 1px solid rgba(23, 32, 42, 0.1);
        border-radius: 6px;
        color: #2f3b48;
        background: rgba(255, 255, 255, 0.62);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .service-card__open {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        color: #ffffff;
        background: var(--service-accent, var(--accent));
        font-size: 20px;
        line-height: 1;
      }

      .empty-state {
        display: none;
        padding: 28px;
        border: 1px dashed rgba(255, 255, 255, 0.4);
        border-radius: 8px;
        color: rgba(255, 255, 255, 0.8);
        background: rgba(0, 0, 0, 0.3);
      }

      @media (max-width: 640px) {
        .page {
          width: min(100% - 28px, 1120px);
        }

        .service-card {
          min-height: 154px;
          padding: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition: none !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px;">
      <div class="service-list" id="service-list"></div>
      <div class="empty-state" id="empty-state">暂时还没有可展示的服务入口。</div>
    </main>

    <script>
      const SERVER_HOST = "124.222.19.212";

      // 新增导航时复制一条对象，只改 name 和 route。
      // route 写端口，或“端口/路径”，例如 "3000/"、"8080/admin"。
      const SERVICE_LINKS = [
        {
          name: "毕业视频企划",
          route: "3000/"
        }
      ];

      const ACCENT_COLORS = ["#f47466", "#1f9d8a", "#4d79c7", "#d39a2d", "#7b6ed6"];

      function normalizeRoute(route) {
        return String(route)
          .trim()
          .replace(/^https?:\/\//i, "")
          .replace(new RegExp(`^${SERVER_HOST}:?`), "")
          .replace(/^:/, "")
          .replace(/^\/+/, "");
      }

      function serviceUrl(route) {
        return `http://${SERVER_HOST}:${normalizeRoute(route)}`;
      }

      function servicePath(route) {
        return normalizeRoute(route).replace(/\/$/, "") || "/";
      }

      function renderServices() {
        const list = document.querySelector("#service-list");
        const empty = document.querySelector("#empty-state");
        const fragment = document.createDocumentFragment();

        empty.style.display = SERVICE_LINKS.length ? "none" : "block";

        SERVICE_LINKS.forEach((item, index) => {
          const url = serviceUrl(item.route);
          const card = document.createElement("a");
          card.className = "service-card";
          card.href = url;
          card.target = "_blank";
          card.rel = "noopener noreferrer";
          card.style.setProperty("--service-accent", item.accent || ACCENT_COLORS[index % ACCENT_COLORS.length]);
          card.setAttribute("aria-label", `打开${item.name}`);
          card.innerHTML = `
            <span class="service-card__main">
              <span class="service-card__top">
                <strong class="service-card__name">${item.name}</strong>
                <span class="service-card__url">${url}</span>
              </span>
              <span class="service-card__bottom">
                <span class="service-card__route">${servicePath(item.route)}</span>
                <span class="service-card__open" aria-hidden="true">↗</span>
              </span>
            </span>
          `;
          fragment.append(card);
        });

        list.replaceChildren(fragment);
      }

      renderServices();
    </script>
  </body>
</html>
